name: Check ShareMouse Updates

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch current version from ShareMouse
        id: fetch
        run: |
          set -euo pipefail

          html=$(curl -fsSL https://www.sharemouse.com/download/)

          # Extract version — page has "Windows Version: X.Y.Z" pattern in text
          # The HTML contains <td>7.0.22 inside the changelog table linked from download page
          # But the download page itself shows version inline
          version=$(echo "$html" | grep -oP 'Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [[ -z "$version" ]]; then
            # Fallback: extract from download URL pattern or page text
            version=$(echo "$html" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi

          if [[ -z "$version" ]]; then
            echo "::error::Could not detect ShareMouse version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📌 Detected ShareMouse version: $version"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.fetch.outputs.version }}"

          if gh release view "$version" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Release $version already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 New version $version detected!"
          fi

      - name: Download files
        if: steps.check.outputs.exists == 'false'
        id: download
        run: |
          set -euo pipefail
          mkdir -p release
          cd release

          BASE="https://www.sharemouse.com"

          declare -A FILES=(
            ["ShareMouseSetup.exe"]="${BASE}/ShareMouseSetup.exe"
            ["ShareMouse_USB.zip"]="${BASE}/ShareMouse_USB.zip"
            ["ShareMouseSetup.dmg"]="${BASE}/ShareMouseSetup.dmg"
            ["ShareMouseMac.zip"]="${BASE}/ShareMouseMac.zip"
          )

          for fname in "${!FILES[@]}"; do
            url="${FILES[$fname]}"
            echo "⬇️  Downloading $fname ..."
            curl -fSL -o "$fname" "$url"
            echo "   ✅ $(stat --format='%s' "$fname") bytes"
          done

      - name: Generate checksums and file info
        if: steps.check.outputs.exists == 'false'
        id: checksums
        run: |
          set -euo pipefail
          cd release

          {
            echo "## 📦 File Checksums"
            echo ""
            echo "| File | Size | SHA-256 |"
            echo "|------|------|---------|"
            for f in ShareMouseSetup.exe ShareMouse_USB.zip ShareMouseSetup.dmg ShareMouseMac.zip; do
              if [[ -f "$f" ]]; then
                size_bytes=$(stat --format='%s' "$f")
                # Human readable size
                if (( size_bytes >= 1048576 )); then
                  size_human="$(echo "scale=1; $size_bytes / 1048576" | bc) MB"
                elif (( size_bytes >= 1024 )); then
                  size_human="$(echo "scale=1; $size_bytes / 1024" | bc) KB"
                else
                  size_human="${size_bytes} B"
                fi
                sha=$(sha256sum "$f" | awk '{print $1}')
                echo "| \`$f\` | $size_human | \`$sha\` |"
              fi
            done
          } > checksums.md

          cat checksums.md
          echo ""
          # Pass to next step via artifact
          cp checksums.md /tmp/checksums.md

      - name: Scrape changelog for current version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          set -euo pipefail
          version="${{ steps.fetch.outputs.version }}"

          # The changelog pages use a <table> structure:
          # <tr><td>DATE<td>VERSION<td><ul><li class="clfix|clnew">TEXT</li></ul><td>...
          # We extract only the <tr> row matching our version.

          get_changelog() {
            local url="$1" platform="$2"
            local html
            html=$(curl -fsSL "$url")

            # Extract the <tr> block for our version
            # Split by <tr>, find the one containing our version
            local block
            block=$(echo "$html" | tr '\n' ' ' | grep -oP "<tr>\s*<td>[^<]*<td>\s*${version}\s*<td>.*?(?=<tr>|</tbody>|</table>)" || true)

            if [[ -z "$block" ]]; then
              echo "  - No changelog entry found for $platform v${version}"
              return
            fi

            # Extract date
            local date
            date=$(echo "$block" | grep -oP '<td>\s*\K[0-9]{2}/[0-9]{2}/[0-9]{4}' | head -1 || true)
            if [[ -n "$date" ]]; then
              echo "  📅 Released: $date"
              echo ""
            fi

            # Extract list items
            echo "$block" | grep -oP '<li[^>]*>\s*\K[^<]+' | while read -r item; do
              # Determine if fix or new
              local prefix="•"
              if echo "$block" | grep -q "clfix.*${item}"; then
                prefix="🔧"
              elif echo "$block" | grep -q "clnew.*${item}"; then
                prefix="✨"
              fi
              echo "  $prefix $item"
            done
          }

          {
            echo "# ShareMouse ${version}"
            echo ""
            echo "## 🪟 Windows Changelog"
            echo ""
            get_changelog "https://www.sharemouse.com/download/changelog/" "Windows"
            echo ""
            echo "## 🍎 macOS Changelog"
            echo ""
            get_changelog "https://www.sharemouse.com/download/changelog-mac/" "macOS"
            echo ""
            echo "---"
            echo ""
            cat /tmp/checksums.md
            echo ""
            echo "---"
            echo ""
            echo "*Mirrored from [sharemouse.com/download](https://www.sharemouse.com/download/)*"
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.fetch.outputs.version }}"

          gh release create "$version" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ShareMouse $version" \
            --notes-file /tmp/release_notes.md \
            release/ShareMouseSetup.exe \
            release/ShareMouse_USB.zip \
            release/ShareMouseSetup.dmg \
            release/ShareMouseMac.zip

          echo "🎉 Release $version published!"
